extends: ../../basic.yaml

output:
  results_dir: benchmark_results/ucb_extreme/model_c

search:
  # Model C: gamma = 1/4, 2c**(1/gamma) = 10
  gamma: 0.25
  c: 10
  # p_s = 0: disable GP-based jump actions
  gp_rate: 0.0
  # epsilon = 0: disable random child exploration
  exploration_rate: 0.0
  # Unused when gp_rate = 0, kept explicit for clarity
  mutation_rate: 0.0
