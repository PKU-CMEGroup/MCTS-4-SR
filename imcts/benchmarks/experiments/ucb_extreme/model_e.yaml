extends: ../../basic.yaml

output:
  results_dir: benchmark_results/ucb_extreme/model_e

search:
  # Model E: gamma = 1/8, 2c**(1/gamma) = 26/3
  gamma: 0.125
  c: 8.666666666667
  # p_s = 0: disable GP-based jump actions
  gp_rate: 0.0
  # epsilon = 0: disable random child exploration
  exploration_rate: 0.0
  # Unused when gp_rate = 0, kept explicit for clarity
  mutation_rate: 0.0
