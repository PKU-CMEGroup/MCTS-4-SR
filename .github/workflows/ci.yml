name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      CTEST_OUTPUT_ON_FAILURE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test dependencies
        run: python -m pip install -e .[test]

      - name: Run Python tests
        run: python -m pytest python/test_imcts.py python/test_benchmarks.py -q

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DIMCTS_BUILD_PYTHON=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DBUILD_TESTING=ON -DIMCTS_BUILD_PYTHON=ON

      - name: Build C++ targets (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build

      - name: Build C++ targets (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Run CTest (Linux)
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure

      - name: Run CTest (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --build-config Release --output-on-failure
